name: 双六小屋 空室監視

on:
  schedule:
    - cron: "5 * * * *"   # 毎時5分（複数ワークフローが同時に走って競合しないよう少しずらしています）
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: 空室チェックを実行
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_ADDRESS: ${{ secrets.TO_ADDRESS }}
          NTFY_ENABLED: ${{ secrets.NTFY_ENABLED }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python sugorokugoya/watch_futamata.py --once

      - name: 状態ファイルの変更をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sugorokugoya/state.json
          git diff --staged --quiet || git commit -m "update sugorokugoya state [skip ci]"
          git push

name: 雲ノ平山荘 空室監視

on:
  schedule:
    - cron: "0 * * * *"   # 毎時0分（1時間ごとに自動実行）
  workflow_dispatch: {}    # Actionsタブから手動実行するためのボタン

permissions:
  contents: write   # 状態ファイル(state.json)をリポジトリにコミットするために必要

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: 空室チェックを実行
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python tenawan/watch_vacancy.py --once

      - name: 状態ファイルの変更をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tenawan/state.json
          git diff --staged --quiet || git commit -m "update tenawan state [skip ci]"
          git push
